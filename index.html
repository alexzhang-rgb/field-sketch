<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Field Sketch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--surface:#fff;--surface2:#f0f1f3;--border:#dddde0;--border2:#c8c8cc;
  --text:#1a1c20;--text2:#5a5c63;--text3:#9a9ba3;
  --accent:#1a3a5c;--accent-light:#e8eff6;--accent-mid:#4a7aac;
  --green:#1a6b3a;--green-bg:#e6f4ec;
  --red:#8b1a1a;--red-bg:#fdeaea;
  --drawer-peek:54px;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:13px;position:fixed;inset:0}
#toolbar{display:flex;align-items:center;gap:5px;padding:6px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;z-index:10;flex-shrink:0}
.tb-group{display:flex;gap:3px;align-items:center}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 3px}
button.tool{padding:6px 9px;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
button.tool.active{background:var(--accent);color:#fff;border-color:var(--accent)}
button.tool.green{background:var(--green-bg);color:var(--green);border-color:#a8d8b8}
button.tool.green.on{background:var(--green);color:#fff;border-color:var(--green)}
button.tool.danger{background:var(--red-bg);color:var(--red);border-color:#e8b0b0}
#canvas-wrap{flex:1;position:relative;overflow:hidden;touch-action:none}
canvas{position:absolute;top:0;left:0;touch-action:none}
#snap-dot{position:absolute;pointer-events:none;width:16px;height:16px;border-radius:50%;border:2.5px solid #f80;background:rgba(255,136,0,0.15);transform:translate(-50%,-50%);display:none;z-index:20}
#magnifier{position:absolute;width:140px;height:140px;border-radius:50%;border:3px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,0.35);overflow:hidden;pointer-events:none;display:none;z-index:60;background:#fff}
#magnifier canvas{position:absolute;top:0;left:0}
#magnifier .mag-crosshair{position:absolute;top:50%;left:50%;width:20px;height:20px;transform:translate(-50%,-50%);pointer-events:none}
#magnifier .mag-crosshair::before,#magnifier .mag-crosshair::after{content:'';position:absolute;background:#f80}
#magnifier .mag-crosshair::before{left:50%;top:0;width:1.5px;height:100%;transform:translateX(-50%)}
#magnifier .mag-crosshair::after{top:50%;left:0;height:1.5px;width:100%;transform:translateY(-50%)}
#toast{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(20,30,50,0.88);color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;z-index:200;display:none;white-space:nowrap;pointer-events:none}
#drawer{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:14px 14px 0 0;z-index:30;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);transform:translateY(0);display:flex;flex-direction:column;max-height:80vh}
#drawer.collapsed{transform:translateY(calc(100% - var(--drawer-peek)))}
#drawer-handle{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 6px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;user-select:none}
#drawer-pill{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 6px}
#drawer-summary{display:flex;gap:14px;align-items:center;font-size:12px;flex:1}
.sum-chip{color:var(--text2)}.sum-chip b{color:var(--accent);font-weight:600}
#drawer-toggle-btn{font-size:11px;color:var(--accent-mid);border:1px solid var(--border2);border-radius:5px;padding:3px 8px;background:var(--surface2);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
#drawer-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.dtab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent}
.dtab.active{color:var(--accent);border-bottom-color:var(--accent)}
#drawer-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dpanel{display:none;padding:10px 12px}.dpanel.active{display:block}
#readings-list{margin-bottom:8px}
.reading-item{padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;-webkit-tap-highlight-color:transparent}
.reading-item.used{opacity:0.38}
.reading-val{font-size:14px;font-weight:600;color:var(--accent)}
.reading-src{font-size:10px;color:var(--text3)}
.reading-del{background:none;border:none;color:var(--text3);font-size:16px;padding:2px 6px;cursor:pointer}
#add-reading-row{display:flex;gap:6px;margin-top:4px}
#add-reading-row input{flex:1;padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:14px;background:var(--surface2)}
#add-reading-row button{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;white-space:nowrap}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;font-size:13px}
.setting-row:last-child{margin-bottom:0}
.setting-row label{color:var(--text2)}
.setting-row select,.setting-row input[type=number]{padding:6px 8px;border:1px solid var(--border2);border-radius:6px;font-size:13px;background:var(--surface2);color:var(--text);width:110px}
#wall-row{display:none}
#bt-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;margin-bottom:10px}
.bt-dot{width:9px;height:9px;border-radius:50%;background:#ccc;flex-shrink:0}
.bt-dot.connected{background:#22a85a}
.bt-dot.scanning{background:#f0a500;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#bt-name{font-size:12px;color:var(--text2);flex:1}
#btn-bt{padding:5px 10px;font-size:12px}
#modal-overlay{display:none;position:absolute;inset:0;background:rgba(20,30,50,0.45);z-index:100;align-items:flex-end;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:var(--surface);border-radius:14px 14px 0 0;padding:20px;width:100%;max-width:500px}
#modal h3{font-size:15px;font-weight:600;margin-bottom:6px}
#modal p{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5}
#modal input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:8px;font-size:16px;margin-bottom:12px;background:var(--surface2)}
.modal-readings{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.modal-reading-btn{padding:7px 12px;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);font-size:13px;cursor:pointer;color:var(--accent);font-weight:600}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:9px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500}
.btn-cancel{background:none;border:1px solid var(--border2);color:var(--text)}
.btn-ok{background:var(--accent);color:#fff;border:none}
#info-bar{padding:3px 10px;background:var(--accent);color:#aac8e4;font-size:10px;display:flex;gap:10px;flex-shrink:0;overflow:hidden}
#info-bar span{white-space:nowrap}
</style>
</head>
<body>

<div id="toolbar">
  <div class="tb-group">
    <button class="tool active" id="btn-draw" onclick="toggleDraw()">✏ Draw</button>
    <button class="tool" id="btn-select" onclick="setMode('select')">↖ Select</button>
    <span id="mode-pill" style="font-size:11px;padding:4px 8px;border-radius:5px;background:#e8eff6;color:#1a3a5c;font-weight:600;white-space:nowrap">✏ Drawing</span>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="tool" onclick="undo()">↩</button>
    <button class="tool" onclick="endChain()">⏎ End</button>
    <button class="tool danger" onclick="clearAll()">✕</button>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="tool" onclick="zoomIn()">+</button>
    <button class="tool" onclick="zoomOut()">−</button>
    <button class="tool" onclick="fitView()">⊡</button>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="bg-canvas"></canvas>
  <canvas id="main-canvas"></canvas>
  <div id="snap-dot"></div>
  <div id="magnifier"><canvas id="mag-canvas" width="140" height="140"></canvas><div class="mag-crosshair"></div></div>
  <div id="toast"></div>
  <div id="modal-overlay">
    <div id="modal">
      <h3 id="modal-title">Assign measurement</h3>
      <p id="modal-desc"></p>
      <div id="modal-readings" class="modal-readings"></div>
      <input type="number" id="modal-input" placeholder="Distance (m)" step="0.001" min="0" inputmode="decimal">
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-ok" onclick="confirmModal()">Assign</button>
      </div>
    </div>
  </div>
</div>

<div id="drawer" class="collapsed">
  <div id="drawer-handle" onclick="toggleDrawer()">
    <div style="flex:1">
      <div id="drawer-pill"></div>
      <div id="drawer-summary">
        <span class="sum-chip">Walls: <b id="sum-walls">0</b></span>
        <span class="sum-chip">Perim: <b id="sum-perim">0.000 m</b></span>
        <span class="sum-chip">Area: <b id="sum-area">0.000 m²</b></span>
      </div>
    </div>
    <button id="drawer-toggle-btn">▲ Panel</button>
  </div>
  <div id="drawer-tabs">
    <div class="dtab active" onclick="showTab('readings')">Readings</div>
    <div class="dtab" onclick="showTab('settings')">Settings</div>
    <div class="dtab" onclick="showTab('export')">Export</div>
  </div>
  <div id="drawer-content">

    <div class="dpanel active" id="tab-readings">
      <div id="readings-list"></div>
      <div id="add-reading-row">
        <input type="number" id="new-reading-val" placeholder="0.000 m" step="0.001" min="0" inputmode="decimal">
        <button onclick="addReadingManual()">+ Add</button>
      </div>
    </div>

    <div class="dpanel" id="tab-settings">
      <div id="bt-row">
        <div class="bt-dot" id="bt-dot"></div>
        <span id="bt-name">No device connected</span>
        <button class="tool green" id="btn-bt" onclick="toggleBluetooth()">⬡ Connect laser</button>
      </div>
      <div class="setting-row">
        <label>Measured from</label>
        <select id="meas-source" onchange="updateSettings()">
          <option value="external" selected>External</option>
          <option value="internal">Internal</option>
        </select>
      </div>
      <div class="setting-row" id="wall-row" style="display:none">
        <label>Wall thickness (m)</label>
        <input type="number" id="wall-thickness" value="0.200" step="0.010" min="0" onchange="updateSettings()">
      </div>
      <div class="setting-row">
        <label>Angle snap</label>
        <select id="angle-snap" onchange="updateSettings()">
          <option value="15">15°</option>
          <option value="30">30°</option>
          <option value="45">45°</option>
          <option value="90">90° only</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Scale (px/m)</label>
        <input type="number" id="px-per-m" value="100" step="10" min="10" onchange="updateSettings()">
      </div>
    </div>

    <div class="dpanel" id="tab-export">
      <div class="setting-row" style="margin-bottom:6px">
        <label>Job / file name</label>
        <input type="text" id="export-filename" value="field-sketch" style="width:140px;padding:6px 8px;border:1px solid var(--border2);border-radius:6px;font-size:13px;background:var(--surface2);color:var(--text)">
      </div>
      <div class="setting-row">
        <label>Include grid</label>
        <input type="checkbox" id="export-grid" checked style="width:18px;height:18px;cursor:pointer">
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">
        <button class="tool" style="width:100%;justify-content:center;padding:10px;font-size:13px" onclick="exportJpeg()">⬇ Download JPEG</button>
        <button class="tool green" id="btn-drive" style="width:100%;justify-content:center;padding:10px;font-size:13px" onclick="exportToDrive()">☁ Save to Google Drive</button>
      </div>
      <p id="drive-status" style="font-size:11px;color:var(--text2);margin-top:10px;line-height:1.5;text-align:center"></p>
      <p style="font-size:10px;color:var(--text3);margin-top:8px;line-height:1.5">First Drive save opens a Google sign-in popup. Allow pop-ups for this page if blocked.</p>
    </div>

  </div>
</div>

<div id="info-bar">
  <span id="info-mode">Draw</span>
  <span id="info-pos">x:— y:—</span>
  <span id="info-angle">—</span>
  <span id="info-len">—</span>
</div>

<script>
const bgCanvas=document.getElementById('bg-canvas');
const mainCanvas=document.getElementById('main-canvas');
const bgCtx=bgCanvas.getContext('2d');
const ctx=mainCanvas.getContext('2d');
const canvasWrap=document.getElementById('canvas-wrap');
const snapDot=document.getElementById('snap-dot');
const magnifier=document.getElementById('magnifier');
const magCanvas=document.getElementById('mag-canvas');
const magCtx=magCanvas.getContext('2d');
const drawer=document.getElementById('drawer');

let W=0,H=0,mode='draw',points=[],walls=[],wallIdCounter=0;
let currentMouse=null,snapPoint=null,selectedWallId=null;
let offset={x:200,y:300},scale=100;
let panning=false,panStart=null;
let history=[],measSource='external',wallThickness=0.2,angleSnap=15;
let readings=[],readingIdCounter=0,drawerOpen=false;
let alignGuides=[];
let sketchMoveStart=null; /* world coords at start of sketch-drag in pan mode */

/* ── drawer ── */
function toggleDrawer(){
  drawerOpen=!drawerOpen;
  drawer.classList.toggle('collapsed',!drawerOpen);
  document.getElementById('drawer-toggle-btn').textContent=drawerOpen?'▼ Panel':'▲ Panel';
  setTimeout(resize,320);
}
function showTab(name){
  const tabs=['readings','settings','export'];
  document.querySelectorAll('.dtab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===name));
  document.querySelectorAll('.dpanel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}
let dSwipeY=null;
drawer.addEventListener('touchstart',e=>{if(e.target.closest('#drawer-content')) return; dSwipeY=e.touches[0].clientY;},{passive:true});
drawer.addEventListener('touchend',e=>{
  if(dSwipeY===null) return;
  const dy=dSwipeY-e.changedTouches[0].clientY;
  if(Math.abs(dy)>30){drawerOpen=dy>0;drawer.classList.toggle('collapsed',!drawerOpen);document.getElementById('drawer-toggle-btn').textContent=drawerOpen?'▼ Panel':'▲ Panel';setTimeout(resize,320);}
  dSwipeY=null;
},{passive:true});

/* ── resize ── */
function resize(){
  const r=canvasWrap.getBoundingClientRect();
  W=r.width; H=r.height;
  bgCanvas.width=mainCanvas.width=W;
  bgCanvas.height=mainCanvas.height=H;
  drawGrid(); render();
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,250));
setTimeout(resize,0); setTimeout(resize,150); setTimeout(resize,500);

/* ── coords ── */
const toScreen=(wx,wy)=>({x:wx*scale+offset.x,y:-wy*scale+offset.y});
const toWorld=(sx,sy)=>({x:(sx-offset.x)/scale,y:-(sy-offset.y)/scale});

/* ── grid ── */
function drawGrid(){
  bgCtx.clearRect(0,0,W,H);
  const step=scale;
  bgCtx.strokeStyle='rgba(80,100,140,0.1)'; bgCtx.lineWidth=0.5;
  const ox=((offset.x%step)+step)%step,oy=((offset.y%step)+step)%step;
  for(let x=ox;x<W;x+=step){bgCtx.beginPath();bgCtx.moveTo(x,0);bgCtx.lineTo(x,H);bgCtx.stroke();}
  for(let y=oy;y<H;y+=step){bgCtx.beginPath();bgCtx.moveTo(0,y);bgCtx.lineTo(W,y);bgCtx.stroke();}
  bgCtx.strokeStyle='rgba(80,100,140,0.28)'; bgCtx.lineWidth=1;
  const s5=step*5,ox5=((offset.x%s5)+s5)%s5,oy5=((offset.y%s5)+s5)%s5;
  for(let x=ox5-s5;x<W+s5;x+=s5){bgCtx.beginPath();bgCtx.moveTo(x,0);bgCtx.lineTo(x,H);bgCtx.stroke();}
  for(let y=oy5-s5;y<H+s5;y+=s5){bgCtx.beginPath();bgCtx.moveTo(0,y);bgCtx.lineTo(W,y);bgCtx.stroke();}
  bgCtx.fillStyle='rgba(80,100,140,0.5)'; bgCtx.font='9px system-ui'; bgCtx.textAlign='center';
  for(let x=ox5-s5;x<W+s5;x+=s5) bgCtx.fillText(((x-offset.x)/scale).toFixed(0)+'m',x,11);
  bgCtx.textAlign='right';
  for(let y=oy5-s5;y<H+s5;y+=s5) bgCtx.fillText((-(y-offset.y)/scale).toFixed(0)+'m',34,y+3);
}

/* ── render ── */

/* find closed polygons from wall graph so we can label their area */
function findClosedPolygons(){
  if(walls.length<3) return [];
  /* build adjacency — each point key maps to list of connected point keys */
  const ptKey=p=>p.x.toFixed(4)+','+p.y.toFixed(4);
  const adj=new Map();
  const ptOf=new Map();
  for(const w of walls){
    const ka=ptKey(w.a),kb=ptKey(w.b);
    if(!adj.has(ka)){adj.set(ka,[]);ptOf.set(ka,w.a);}
    if(!adj.has(kb)){adj.set(kb,[]);ptOf.set(kb,w.b);}
    adj.get(ka).push(kb); adj.get(kb).push(ka);
  }
  /* simple cycle detection — DFS looking for nodes with degree>=2 that form a loop */
  const polygons=[];
  const usedEdge=new Set();
  for(const [startKey] of adj){
    if(adj.get(startKey).length<2) continue;
    /* walk around trying to find a cycle */
    const stack=[[startKey,[startKey]]];
    while(stack.length){
      const [cur,path]=stack.pop();
      for(const nb of adj.get(cur)){
        const edgeKey=[cur,nb].sort().join('|');
        if(nb===startKey&&path.length>=3){
          /* found a cycle */
          const cycleKey=path.slice().sort().join('>');
          if(!usedEdge.has(cycleKey)){
            usedEdge.add(cycleKey);
            polygons.push(path.map(k=>ptOf.get(k)));
          }
          continue;
        }
        if(path.includes(nb)) continue;
        if(path.length>10) continue; /* avoid runaway */
        stack.push([nb,[...path,nb]]);
      }
    }
  }
  return polygons;
}

function polygonArea(pts){
  let a=0;
  for(let i=0;i<pts.length;i++){const j=(i+1)%pts.length;a+=pts[i].x*pts[j].y-pts[j].x*pts[i].y;}
  return Math.abs(a)/2;
}
function polygonCentroid(pts){
  let cx=0,cy=0;
  for(const p of pts){cx+=p.x;cy+=p.y;}
  return {x:cx/pts.length,y:cy/pts.length};
}

function render(){
  ctx.clearRect(0,0,W,H);
  for(const w of walls){
    const a=toScreen(w.a.x,w.a.y),b=toScreen(w.b.x,w.b.y);
    const isSel=selectedWallId===w.id;
    ctx.strokeStyle=isSel?'#f80':(w.measurement!==null?'#1a3a5c':'#4a7aac');
    ctx.lineWidth=isSel?3:2;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();

    /* ── dimension label on every wall ── */
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    const dx=b.x-a.x,dy=b.y-a.y,wlen=Math.hypot(dx,dy)||1;
    const nx=-dy/wlen*14,ny=dx/wlen*14;
    const isVerified=w.measurement!==null;
    const displayVal=isVerified?w.measurement:Math.hypot(w.b.x-w.a.x,w.b.y-w.a.y);
    /* only show drawn (unverified) labels if wall is long enough on screen to fit */
    const screenLen=Math.hypot(b.x-a.x,b.y-a.y);
    if(screenLen>30||isVerified){
      const label=displayVal.toFixed(3)+'m';
      ctx.save();
      ctx.font=(isVerified?'bold ':'')+'11px system-ui';
      ctx.textAlign='center';ctx.textBaseline='middle';
      const tw=ctx.measureText(label).width;
      /* background pill */
      ctx.fillStyle=isVerified?'rgba(232,239,246,0.95)':'rgba(255,255,255,0.82)';
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(mx+nx-tw/2-4,my+ny-8,tw+8,16,4):ctx.fillRect(mx+nx-tw/2-4,my+ny-8,tw+8,16);
      ctx.fill();
      /* border — solid for verified, dashed-look via alpha for unverified */
      ctx.strokeStyle=isVerified?'#1a3a5c':'rgba(74,122,172,0.4)';
      ctx.lineWidth=isVerified?1.2:0.8;
      ctx.stroke();
      ctx.fillStyle=isVerified?'#1a3a5c':'#4a7aac';
      ctx.fillText(label,mx+nx,my+ny);
      ctx.restore();
    }
  }

  const seen=new Set();
  const drawPt=(p,r=4)=>{
    const k=ptKey(p);
    if(seen.has(k)) return; seen.add(k);
    const s=toScreen(p.x,p.y);
    const isSel=selectedPointKey===k;
    ctx.beginPath();ctx.arc(s.x,s.y,isSel?8:r,0,Math.PI*2);
    ctx.fillStyle=isSel?'#f80':'#1a3a5c';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=isSel?2.5:1.5;ctx.stroke();
    if(isSel){
      /* outer ring */
      ctx.beginPath();ctx.arc(s.x,s.y,13,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,136,0,0.4)';ctx.lineWidth=2;ctx.stroke();
    }
  };
  for(const w of walls){drawPt(w.a);drawPt(w.b);}
  for(const p of points) drawPt(p,5);

  /* alignment guides */
  for(const g of alignGuides){
    ctx.strokeStyle='#e0227a'; ctx.lineWidth=1; ctx.setLineDash([5,4]);
    ctx.beginPath();
    if(g.type==='v'){ const sx=toScreen(g.value,0).x; ctx.moveTo(sx,0); ctx.lineTo(sx,H); }
    else{ const sy=toScreen(0,g.value).y; ctx.moveTo(0,sy); ctx.lineTo(W,sy); }
    ctx.stroke(); ctx.setLineDash([]);
  }

  /* ── area labels for closed polygons ── */
  const polys=findClosedPolygons();
  for(const poly of polys){
    if(poly.length<3) continue;
    /* compute internal area from drawn geometry */
    const intArea=polygonArea(poly);
    /* compute GFA:
       External mode → GFA = intArea (geometry already is external)
       Internal mode → each wall is (measured + wallThickness) externally.
       Scale factor per dimension = extLen/intLen, so area scales by (extPerim/intPerim)²
       This gives exact (w+t)(h+t) for rectangles and a good general approximation. */
    let gfa=intArea;
    if(measSource==='internal'&&wallThickness>0){
      const TOL=0.001;
      let intPerim=0,extPerim=0;
      for(let i=0;i<poly.length;i++){
        const p=poly[i],nxt=poly[(i+1)%poly.length];
        const intLen=Math.hypot(nxt.x-p.x,nxt.y-p.y);
        intPerim+=intLen;
        /* find matching wall to get its assigned measurement if any */
        const w=walls.find(w=>(
          (Math.abs(w.a.x-p.x)<TOL&&Math.abs(w.a.y-p.y)<TOL&&Math.abs(w.b.x-nxt.x)<TOL&&Math.abs(w.b.y-nxt.y)<TOL)||
          (Math.abs(w.b.x-p.x)<TOL&&Math.abs(w.b.y-p.y)<TOL&&Math.abs(w.a.x-nxt.x)<TOL&&Math.abs(w.a.y-nxt.y)<TOL)
        ));
        const measLen=w?.measurement??intLen;
        extPerim+=measLen+wallThickness;
      }
      const scale=intPerim>0?extPerim/intPerim:1;
      gfa=intArea*scale*scale;
    }
    if(gfa<0.01) continue;
    const cen=polygonCentroid(poly);
    const sc=toScreen(cen.x,cen.y);
    const areaLabel=gfa.toFixed(2)+' m² GFA';
    ctx.save();
    ctx.font='bold 13px system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    const tw=ctx.measureText(areaLabel).width;
    ctx.fillStyle='rgba(232,239,246,0.92)';
    ctx.beginPath();
    ctx.roundRect?ctx.roundRect(sc.x-tw/2-8,sc.y-12,tw+16,24,6):ctx.fillRect(sc.x-tw/2-8,sc.y-12,tw+16,24);
    ctx.fill();
    ctx.strokeStyle='#1a3a5c';ctx.lineWidth=1.2;ctx.stroke();
    ctx.fillStyle='#1a3a5c';
    ctx.fillText(areaLabel,sc.x,sc.y);
    ctx.restore();
  }

  if(currentMouse&&mode==='draw'&&points.length>0){
    const last=points[points.length-1],wp=snapPoint||currentMouse;
    const a=toScreen(last.x,last.y),b=toScreen(wp.x,wp.y);
    ctx.strokeStyle='rgba(26,58,92,0.4)';ctx.lineWidth=1.5;ctx.setLineDash([6,5]);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.setLineDash([]);
    const len=Math.hypot(wp.x-last.x,wp.y-last.y);
    ctx.fillStyle='rgba(26,58,92,0.9)';ctx.font='11px system-ui';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(len.toFixed(3)+'m',(a.x+b.x)/2,(a.y+b.y)/2-4);
  }
  updateSummary();
}

/* ── snap ── */
function findSnap(wx,wy){
  const r=0.18;let best=null,bestD=Infinity;
  const all=[...points];
  for(const w of walls) all.push(w.a,w.b);
  for(const p of all){const d=Math.hypot(p.x-wx,p.y-wy);if(d<r&&d<bestD){bestD=d;best=p;}}
  return best;
}
function angleSnapped(last,wx,wy){
  const dx=wx-last.x,dy=wy-last.y;
  const a=Math.atan2(dy,dx)*180/Math.PI;
  const s=Math.round(a/angleSnap)*angleSnap;
  const rad=s*Math.PI/180,len=Math.hypot(dx,dy);
  return {x:last.x+Math.cos(rad)*len,y:last.y+Math.sin(rad)*len,angle:s};
}

/* find horizontal/vertical alignment with existing points (within tolerance) */
function findAlignment(curPt, excludePt){
  const TOL=0.06; /* metres */
  const allPts=[];
  for(const w of walls) allPts.push(w.a,w.b);
  let guides=[];
  let snappedX=curPt.x, snappedY=curPt.y;
  let bestVDist=Infinity, bestHDist=Infinity;
  for(const p of allPts){
    if(excludePt && Math.abs(p.x-excludePt.x)<0.0001 && Math.abs(p.y-excludePt.y)<0.0001) continue;
    const dx=Math.abs(p.x-curPt.x);
    if(dx<TOL && dx<bestVDist){ bestVDist=dx; snappedX=p.x; }
    const dy=Math.abs(p.y-curPt.y);
    if(dy<TOL && dy<bestHDist){ bestHDist=dy; snappedY=p.y; }
  }
  if(bestVDist<TOL) guides.push({type:'v', value:snappedX});
  if(bestHDist<TOL) guides.push({type:'h', value:snappedY});
  return { x:snappedX, y:snappedY, guides };
}

/* ── pointer state ── */
function updatePointer(cx,cy){
  const wPos=toWorld(cx,cy);
  document.getElementById('info-pos').textContent=`x:${wPos.x.toFixed(2)} y:${wPos.y.toFixed(2)}`;
  snapPoint=findSnap(wPos.x,wPos.y);
  if(snapPoint){const s=toScreen(snapPoint.x,snapPoint.y);snapDot.style.display='block';snapDot.style.left=s.x+'px';snapDot.style.top=s.y+'px';}
  else snapDot.style.display='none';
  alignGuides=[];
  if(mode==='draw'){
    if(snapPoint){currentMouse=snapPoint;document.getElementById('info-angle').textContent='snap';}
    else if(points.length>0){
      const sn=angleSnapped(points[points.length-1],wPos.x,wPos.y);
      const al=findAlignment({x:sn.x,y:sn.y}, points[points.length-1]);
      currentMouse={x:al.x,y:al.y};
      alignGuides=al.guides;
      document.getElementById('info-angle').textContent=Math.round(sn.angle)+'°';
    }
    else{currentMouse=wPos;document.getElementById('info-angle').textContent='—';}
    if(points.length>0){const l=points[points.length-1];document.getElementById('info-len').textContent=Math.hypot(currentMouse.x-l.x,currentMouse.y-l.y).toFixed(3)+'m';}
  }
}

/* ── mouse ── */
mainCanvas.addEventListener('contextmenu',e=>{e.preventDefault();endChain();});
mainCanvas.addEventListener('mousemove',e=>{
  const r=mainCanvas.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
  if(panning){
    if(mode==='pan'&&sketchMoveStart&&walls.length){
      /* move entire sketch — translate all wall endpoints by world delta */
      const wNow=toWorld(cx,cy);
      const ddx=wNow.x-sketchMoveStart.x, ddy=wNow.y-sketchMoveStart.y;
      if(Math.abs(ddx)>0.0001||Math.abs(ddy)>0.0001){
        for(const w of walls){w.a={x:w.a.x+ddx,y:w.a.y+ddy};w.b={x:w.b.x+ddx,y:w.b.y+ddy};}
        sketchMoveStart=wNow;
      }
    } else {
      /* normal canvas pan */
      offset.x+=cx-panStart.x;offset.y+=cy-panStart.y;
      drawGrid();
    }
    panStart={x:cx,y:cy};render();return;
  }
  updatePointer(cx,cy);render();
});
mainCanvas.addEventListener('mousedown',e=>{
  const r=mainCanvas.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
  if(e.button===1||e.altKey){panning=true;panStart={x:cx,y:cy};sketchMoveStart=null;return;}
  if(mode==='pan'){
    panning=true;panStart={x:cx,y:cy};
    /* if walls exist, drag moves sketch; otherwise pan canvas */
    sketchMoveStart=walls.length?toWorld(cx,cy):null;
    return;
  }
  if(mode==='draw') placePoint(cx,cy);
  else if(mode==='select') selectWall(cx,cy);
});
mainCanvas.addEventListener('mouseup',()=>{panning=false;sketchMoveStart=null;});
mainCanvas.addEventListener('mouseleave',()=>{panning=false;sketchMoveStart=null;currentMouse=null;snapPoint=null;snapDot.style.display='none';render();});
mainCanvas.addEventListener('dblclick',()=>{if(mode==='draw') endChain();});
mainCanvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=mainCanvas.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
  const wb=toWorld(cx,cy);
  scale=Math.max(15,Math.min(600,scale*(e.deltaY<0?1.12:0.88)));
  const wa=toWorld(cx,cy);
  offset.x+=(wa.x-wb.x)*scale;offset.y-=(wa.y-wb.y)*scale;
  document.getElementById('px-per-m').value=Math.round(scale);
  drawGrid();render();
},{passive:false});

/* ── touch ── */
let t1Prev=null,tStartPos=null,tMoved=false;
let pinchDist=null,pinchScale=null,pinchMid=null;
let longTimer=null,dragDrawing=false,dragStartWorld=null;

function tMidScreen(t1,t2){
  const r=mainCanvas.getBoundingClientRect();
  return {cx:(t1.clientX+t2.clientX)/2-r.left,cy:(t1.clientY+t2.clientY)/2-r.top};
}

mainCanvas.addEventListener('touchstart',e=>{
  e.preventDefault();clearTimeout(longTimer);dragDrawing=false;dragStartWorld=null;draggingPoint=false;
  if(e.touches.length===1){
    const r=mainCanvas.getBoundingClientRect(),cx=e.touches[0].clientX-r.left,cy=e.touches[0].clientY-r.top;
    t1Prev={cx,cy};tStartPos={cx,cy};tMoved=false;
    if(mode==='draw'){
      const wPos=toWorld(cx,cy),snap=findSnap(wPos.x,wPos.y);
      dragStartWorld=snap||wPos;
      snapPoint=snap;
      currentMouse=snap||wPos;
      render();
      showMagnifier(cx,cy);
      longTimer=setTimeout(()=>{if(!tMoved&&!dragDrawing){endChain();showToast('Chain ended');}},650);
    } else if(mode==='select'){
      /* check if touching near a point — if so, prepare to drag it */
      const wPos=toWorld(cx,cy);
      const allPts=getAllPoints();
      let bestD=Infinity, nearPt=null;
      for(const p of allPts){
        const d=Math.hypot(p.x-wPos.x,p.y-wPos.y);
        if(d<0.18&&d<bestD){bestD=d;nearPt=p;}
      }
      if(nearPt){selectedPointKey=ptKey(nearPt);selectedWallId=null;}
    }
  } else if(e.touches.length===2){
    clearTimeout(longTimer);dragDrawing=false;dragStartWorld=null;draggingPoint=false;
    pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pinchScale=scale;pinchMid=tMidScreen(e.touches[0],e.touches[1]);t1Prev=null;
  }
},{passive:false});

mainCanvas.addEventListener('touchmove',e=>{
  e.preventDefault();clearTimeout(longTimer);
  if(e.touches.length===1&&t1Prev){
    const r=mainCanvas.getBoundingClientRect(),cx=e.touches[0].clientX-r.left,cy=e.touches[0].clientY-r.top;
    if(Math.hypot(cx-tStartPos.cx,cy-tStartPos.cy)>8) tMoved=true;
    if(mode==='draw'&&dragStartWorld){
      dragDrawing=true;
      const wPos=toWorld(cx,cy),snap=findSnap(wPos.x,wPos.y);
      snapPoint=snap;
      if(snap){
        currentMouse=snap; alignGuides=[];
        const s=toScreen(snap.x,snap.y);
        snapDot.style.display='block'; snapDot.style.left=s.x+'px'; snapDot.style.top=s.y+'px';
      } else {
        snapDot.style.display='none';
        const sn=angleSnapped(dragStartWorld,wPos.x,wPos.y);
        const al=findAlignment({x:sn.x,y:sn.y}, dragStartWorld);
        currentMouse={x:al.x,y:al.y};
        alignGuides=al.guides;
        document.getElementById('info-angle').textContent=Math.round(sn.angle)+'°';
      }
      document.getElementById('info-len').textContent=Math.hypot(currentMouse.x-dragStartWorld.x,currentMouse.y-dragStartWorld.y).toFixed(3)+'m';
      t1Prev={cx,cy};renderDragPreview();showMagnifier(cx,cy);return;
    }
    if(mode==='select'&&selectedPointKey&&tMoved){
      /* drag the selected point — move all connected walls rigidly */
      draggingPoint=true;
      const wPos=toWorld(cx,cy);
      const snap=findSnap(wPos.x,wPos.y);
      const al=findAlignment(wPos,null);
      const newPt=snap||{x:al.x,y:al.y};
      /* find current actual position of the selected point */
      const allPts=getAllPoints();
      const curPt=allPts.find(p=>ptKey(p)===selectedPointKey);
      if(curPt){
        const ddx=newPt.x-curPt.x, ddy=newPt.y-curPt.y;
        if(Math.abs(ddx)>0.0001||Math.abs(ddy)>0.0001){
          /* move all walls sharing this point */
          const TOL=0.0001;
          for(const w of walls){
            if(Math.abs(w.a.x-curPt.x)<TOL&&Math.abs(w.a.y-curPt.y)<TOL) w.a={x:newPt.x,y:newPt.y};
            if(Math.abs(w.b.x-curPt.x)<TOL&&Math.abs(w.b.y-curPt.y)<TOL) w.b={x:newPt.x,y:newPt.y};
          }
          selectedPointKey=ptKey(newPt);
          alignGuides=al.guides||[];
          render();showMagnifier(cx,cy);
        }
      }
      t1Prev={cx,cy};return;
    }
    if(mode!=='draw'&&!selectedPointKey){
      if(mode==='pan'&&walls.length){
        /* single finger in pan mode = move entire sketch */
        const wPrev=toWorld(t1Prev.cx,t1Prev.cy);
        const wNow=toWorld(cx,cy);
        const ddx=wNow.x-wPrev.x, ddy=wNow.y-wPrev.y;
        for(const w of walls){w.a={x:w.a.x+ddx,y:w.a.y+ddy};w.b={x:w.b.x+ddx,y:w.b.y+ddy};}
      } else {
        offset.x+=cx-t1Prev.cx;offset.y+=cy-t1Prev.cy;drawGrid();
      }
      hideMagnifier();
    }
    updatePointer(cx,cy);t1Prev={cx,cy};render();
    if(mode==='draw') showMagnifier(cx,cy);
  } else if(e.touches.length===2&&pinchDist!==null){
    const newDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const newMid=tMidScreen(e.touches[0],e.touches[1]);
    const wb=toWorld(pinchMid.cx,pinchMid.cy);
    scale=Math.max(15,Math.min(600,pinchScale*(newDist/pinchDist)));
    const panDx=newMid.cx-pinchMid.cx,panDy=newMid.cy-pinchMid.cy;
    const wa=toWorld(pinchMid.cx,pinchMid.cy);
    offset.x+=(wa.x-wb.x)*scale+panDx;offset.y-=(wa.y-wb.y)*scale-panDy;
    pinchMid=newMid;pinchDist=newDist;pinchScale=scale;
    document.getElementById('px-per-m').value=Math.round(scale);
    drawGrid();render();
  }
},{passive:false});

mainCanvas.addEventListener('touchend',e=>{
  e.preventDefault();clearTimeout(longTimer);hideMagnifier();
  if(e.touches.length===0&&e.changedTouches.length===1){
    const r=mainCanvas.getBoundingClientRect(),cx=e.changedTouches[0].clientX-r.left,cy=e.changedTouches[0].clientY-r.top;
    if(mode==='draw'){
      if(dragDrawing&&dragStartWorld){
        const wPos=toWorld(cx,cy),snapEnd=findSnap(wPos.x,wPos.y);
        let endPt;
        if(snapEnd){ endPt={...snapEnd}; }
        else{
          const sn=angleSnapped(dragStartWorld,wPos.x,wPos.y);
          const al=findAlignment({x:sn.x,y:sn.y}, dragStartWorld);
          endPt={x:al.x,y:al.y};
        }
        if(Math.hypot(endPt.x-dragStartWorld.x,endPt.y-dragStartWorld.y)>0.01){
          saveHistory();
          const startSnap=findSnap(dragStartWorld.x,dragStartWorld.y);
          walls.push({a:{...(startSnap||dragStartWorld)},b:{...endPt},measurement:null,id:wallIdCounter++});
          points=snapEnd?[]:[endPt];
          showToast('Wall added');
        }
        dragDrawing=false;dragStartWorld=null;currentMouse=null;alignGuides=[];render();return;
      }
      if(!tMoved) placePoint(cx,cy);
    } else if(mode==='select'){
      if(draggingPoint){
        /* point drag committed — clear drag state, update wall measurements that changed length */
        draggingPoint=false;
        /* clear manual measurements on walls whose geometry changed so they re-display correctly */
        showToast('Point moved');
        alignGuides=[];render();
      } else if(!tMoved){
        selectWall(cx,cy);
      }
      selectedPointKey=null;
    }
    t1Prev=null;tStartPos=null;dragDrawing=false;dragStartWorld=null;alignGuides=[];
  }
  if(e.touches.length<2){pinchDist=null;pinchScale=null;pinchMid=null;}
},{passive:false});

mainCanvas.addEventListener('touchcancel',()=>{clearTimeout(longTimer);t1Prev=null;pinchDist=null;dragDrawing=false;dragStartWorld=null;hideMagnifier();},{passive:true});

function renderDragPreview(){
  ctx.clearRect(0,0,W,H);
  for(const g of alignGuides){
    ctx.strokeStyle='#e0227a'; ctx.lineWidth=1; ctx.setLineDash([5,4]);
    ctx.beginPath();
    if(g.type==='v'){ const sx=toScreen(g.value,0).x; ctx.moveTo(sx,0); ctx.lineTo(sx,H); }
    else{ const sy=toScreen(0,g.value).y; ctx.moveTo(0,sy); ctx.lineTo(W,sy); }
    ctx.stroke(); ctx.setLineDash([]);
  }
  for(const w of walls){
    const a=toScreen(w.a.x,w.a.y),b=toScreen(w.b.x,w.b.y);
    ctx.strokeStyle=selectedWallId===w.id?'#f80':(w.measurement!==null?'#1a3a5c':'#4a7aac');
    ctx.lineWidth=selectedWallId===w.id?3:2;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    if(w.measurement!==null){
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1;
      const nx=-dy/len*14,ny=dx/len*14,label=w.measurement.toFixed(3)+'m';
      ctx.save();ctx.font='bold 11px Arial,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      const tw=ctx.measureText(label).width;
      ctx.fillStyle='rgba(255,255,255,0.88)';ctx.fillRect(mx+nx-tw/2-3,my+ny-8,tw+6,16);
      ctx.fillStyle='#1a3a5c';ctx.fillText(label,mx+nx,my+ny);ctx.restore();
    }
  }
  if(dragStartWorld&&currentMouse){
    const a=toScreen(dragStartWorld.x,dragStartWorld.y),b=toScreen(currentMouse.x,currentMouse.y);
    ctx.strokeStyle='#22a85a';ctx.lineWidth=2.5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    ctx.beginPath();ctx.arc(a.x,a.y,6,0,Math.PI*2);ctx.fillStyle='#22a85a';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fillStyle='#1a3a5c';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    const len=Math.hypot(currentMouse.x-dragStartWorld.x,currentMouse.y-dragStartWorld.y);
    ctx.fillStyle='rgba(26,58,92,0.92)';ctx.font='bold 12px system-ui';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(len.toFixed(3)+'m',(a.x+b.x)/2,(a.y+b.y)/2-6);
  }
  const seen=new Set();
  for(const w of walls) for(const p of[w.a,w.b]){
    const k=p.x.toFixed(4)+','+p.y.toFixed(4);if(seen.has(k)) continue;seen.add(k);
    const s=toScreen(p.x,p.y);
    ctx.beginPath();ctx.arc(s.x,s.y,4,0,Math.PI*2);ctx.fillStyle='#1a3a5c';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  }
  updateSummary();
}

/* ── magnifier loupe ──
   Shows a zoomed circular view of the canvas centred on the finger's
   target point (point being placed/dragged), offset above the finger
   so it isn't covered by the hand. */
const MAG_ZOOM=2.8; /* zoom factor relative to main canvas */
const MAG_SIZE=140;
const MAG_OFFSET_Y=-110; /* px above touch point */

function showMagnifier(touchCx, touchCy){
  /* figure out what world point we're targeting — prefer snap, else currentMouse, else raw touch */
  let targetWorld;
  if(snapPoint){ targetWorld=snapPoint; }
  else if(currentMouse){ targetWorld=currentMouse; }
  else{ targetWorld=toWorld(touchCx,touchCy); }
  const targetScreen=toScreen(targetWorld.x,targetWorld.y);

  /* draw zoomed snapshot of main canvas centred on targetScreen */
  magCtx.clearRect(0,0,MAG_SIZE,MAG_SIZE);
  magCtx.save();
  magCtx.beginPath();
  magCtx.arc(MAG_SIZE/2,MAG_SIZE/2,MAG_SIZE/2,0,Math.PI*2);
  magCtx.clip();
  magCtx.fillStyle='#fff';
  magCtx.fillRect(0,0,MAG_SIZE,MAG_SIZE);
  /* draw both bg grid and main canvas, scaled */
  const srcSize=MAG_SIZE/MAG_ZOOM;
  const sx=targetScreen.x-srcSize/2, sy=targetScreen.y-srcSize/2;
  magCtx.drawImage(bgCanvas, sx, sy, srcSize, srcSize, 0, 0, MAG_SIZE, MAG_SIZE);
  magCtx.drawImage(mainCanvas, sx, sy, srcSize, srcSize, 0, 0, MAG_SIZE, MAG_SIZE);
  magCtx.restore();
  /* ring border */
  magCtx.beginPath();
  magCtx.arc(MAG_SIZE/2,MAG_SIZE/2,MAG_SIZE/2-1.5,0,Math.PI*2);
  magCtx.strokeStyle=snapPoint?'#f80':'#1a3a5c';
  magCtx.lineWidth=3;
  magCtx.stroke();

  /* position the magnifier bubble above the finger, clamped inside canvas-wrap */
  let bx=touchCx, by=touchCy+MAG_OFFSET_Y;
  bx=Math.max(MAG_SIZE/2+4, Math.min(W-MAG_SIZE/2-4, bx));
  by=Math.max(MAG_SIZE/2+4, by);
  magnifier.style.left=(bx-MAG_SIZE/2)+'px';
  magnifier.style.top=(by-MAG_SIZE/2)+'px';
  magnifier.style.display='block';
}

function hideMagnifier(){
  magnifier.style.display='none';
}


function placePoint(cx,cy){
  const wPos=toWorld(cx,cy);
  let wx,wy;
  const snap=findSnap(wPos.x,wPos.y);
  if(snap){wx=snap.x;wy=snap.y;}
  else if(points.length>0){const s=angleSnapped(points[points.length-1],wPos.x,wPos.y);wx=s.x;wy=s.y;}
  else{wx=wPos.x;wy=wPos.y;}
  if(points.length>0){
    const last=points[points.length-1];
    if(Math.hypot(wx-last.x,wy-last.y)<0.001) return;
    saveHistory();
    const target=snap||{x:wx,y:wy};
    walls.push({a:{...last},b:{...target},measurement:null,id:wallIdCounter++});
    if(snap){endChain();}else{points.push({x:wx,y:wy});}
  } else {saveHistory();points.push({x:wx,y:wy});}
  render();
}
function endChain(){points=[];currentMouse=null;alignGuides=[];document.getElementById('info-angle').textContent='—';document.getElementById('info-len').textContent='—';render();}

/* ── select ── */
const ptKey=p=>p.x.toFixed(4)+','+p.y.toFixed(4);

function getAllPoints(){
  const seen=new Set(), pts=[];
  for(const w of walls){
    for(const p of[w.a,w.b]){
      const k=ptKey(p);
      if(!seen.has(k)){seen.add(k);pts.push(p);}
    }
  }
  return pts;
}

function selectWall(cx,cy){
  const wPos=toWorld(cx,cy);
  /* check points first — 0.15m tap radius */
  const allPts=getAllPoints();
  let bestPtD=Infinity;
  selectedPointKey=null;
  for(const p of allPts){
    const d=Math.hypot(p.x-wPos.x,p.y-wPos.y);
    if(d<0.15&&d<bestPtD){bestPtD=d;selectedPointKey=ptKey(p);}
  }
  if(selectedPointKey){selectedWallId=null;render();return;}
  /* otherwise check walls */
  selectedWallId=null;let bestD=Infinity;
  for(const w of walls){const d=distSeg(wPos,w.a,w.b);if(d<0.14&&d<bestD){bestD=d;selectedWallId=w.id;}}
  if(selectedWallId!==null) openModal(selectedWallId);
  render();
}
function distSeg(p,a,b){
  const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
  if(!l2) return Math.hypot(p.x-a.x,p.y-a.y);
  let t=((p.x-a.x)*dx+(p.y-a.y)*dy)/l2;
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));
}

/* ── selected point state (for point-drag in select mode) ── */
let selectedPointKey=null; /* "x,y" key of the point being dragged */
let draggingPoint=false;

/* translate a point and rigidly propagate the move to all connected walls,
   cascading outward like pushing a chain — walls keep their length and angle,
   they just translate. We do a BFS from the moved point, never backtracking
   through the wall we came from, so the "fixed" side of the resized wall stays put. */
function propagateMove(oldX, oldY, newX, newY, sourceWallId){
  const TOL=0.0001;
  const dx=newX-oldX, dy=newY-oldY;
  /* visited set — point keys we've already moved, to stop infinite loops */
  const visited=new Set();
  visited.add(oldX.toFixed(4)+','+oldY.toFixed(4));

  /* BFS queue: each entry = {ptX, ptY} — the point we just moved to */
  const queue=[{px:oldX,py:oldY}];

  while(queue.length){
    const {px,py}=queue.shift();
    for(const w of walls){
      if(w.id===sourceWallId) continue; /* don't cascade back through the resized wall */
      let moved=null;
      if(Math.abs(w.a.x-px)<TOL && Math.abs(w.a.y-py)<TOL){
        /* this wall's A matches — translate the whole wall */
        const oldBKey=w.b.x.toFixed(4)+','+w.b.y.toFixed(4);
        if(!visited.has(oldBKey)){
          visited.add(oldBKey);
          queue.push({px:w.b.x,py:w.b.y});
        }
        w.a={x:w.a.x+dx,y:w.a.y+dy};
        w.b={x:w.b.x+dx,y:w.b.y+dy};
      } else if(Math.abs(w.b.x-px)<TOL && Math.abs(w.b.y-py)<TOL){
        /* this wall's B matches — translate the whole wall */
        const oldAKey=w.a.x.toFixed(4)+','+w.a.y.toFixed(4);
        if(!visited.has(oldAKey)){
          visited.add(oldAKey);
          queue.push({px:w.a.x,py:w.a.y});
        }
        w.a={x:w.a.x+dx,y:w.a.y+dy};
        w.b={x:w.b.x+dx,y:w.b.y+dy};
      }
    }
  }
}

function rescaleWall(w, newLen){
  const dx=w.b.x-w.a.x, dy=w.b.y-w.a.y;
  const currentLen=Math.hypot(dx,dy);
  if(currentLen<0.0001) return;
  const ux=dx/currentLen, uy=dy/currentLen;
  const oldBx=w.b.x, oldBy=w.b.y;
  const newBx=w.a.x+ux*newLen;
  const newBy=w.a.y+uy*newLen;
  /* move b to new position */
  w.b={x:newBx,y:newBy};
  /* rigidly propagate — all walls connected to old B translate by the delta */
  propagateMove(oldBx, oldBy, newBx, newBy, w.id);
}

function confirmModal(){

      saveHistory();
      w.measurement=val;
      rescaleWall(w, val);

/* ── summary ── */
/* ── GFA calculation ──
   External: entered measurement IS the external wall face distance → use as-is
   Internal: entered measurement is internal clear distance → external = internal + wallThickness
   GFA polygon is built by scaling each wall to its external length, keeping wall.a fixed,
   so the polygon vertices shift outward correctly. */
function getGFAPolygon(){
  if(!walls.length) return [];
  /* if external, geometry already reflects external dims — use walls directly */
  if(measSource==='external') return walls.map(w=>({...w.a}));
  /* internal: rebuild polygon with each wall extended by wallThickness */
  const t=wallThickness;
  const gfaWalls=walls.map(w=>{
    const val=w.measurement!==null?w.measurement:Math.hypot(w.b.x-w.a.x,w.b.y-w.a.y);
    const extLen=val+t;
    const dx=w.b.x-w.a.x,dy=w.b.y-w.a.y;
    const len=Math.hypot(dx,dy)||1;
    const ux=dx/len,uy=dy/len;
    return {
      a:{...w.a},
      b:{x:w.a.x+ux*extLen, y:w.a.y+uy*extLen}
    };
  });
  return gfaWalls.map(w=>({...w.a}));
}

function computeGFA(pts){
  /* shoelace on provided points */
  let a=0;
  for(let i=0;i<pts.length;i++){const j=(i+1)%pts.length;a+=pts[i].x*pts[j].y-pts[j].x*pts[i].y;}
  return Math.abs(a)/2;
}

function getWallExternalLen(w){
  const raw=w.measurement!==null?w.measurement:Math.hypot(w.b.x-w.a.x,w.b.y-w.a.y);
  return measSource==='internal'?raw+wallThickness:raw;
}

function updateSummary(){
  /* perimeter = sum of external wall lengths */
  let perim=0;
  for(const w of walls) perim+=getWallExternalLen(w);

  /* GFA area */
  const gfaPts=getGFAPolygon();
  const gfa=computeGFA(gfaPts);

  document.getElementById('sum-walls').textContent=walls.length;
  document.getElementById('sum-perim').textContent=perim.toFixed(3)+' m';
  document.getElementById('sum-area').textContent=gfa.toFixed(2)+' m² GFA';
}

function zoomIn(){scale=Math.min(600,scale*1.2);document.getElementById('px-per-m').value=Math.round(scale);drawGrid();render();}
function zoomOut(){scale=Math.max(15,scale/1.2);document.getElementById('px-per-m').value=Math.round(scale);drawGrid();render();}
function fitView(){
  if(!walls.length){offset={x:W/2,y:H/2};scale=100;drawGrid();render();return;}
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  for(const w of walls) for(const p of[w.a,w.b]){x0=Math.min(x0,p.x);x1=Math.max(x1,p.x);y0=Math.min(y0,p.y);y1=Math.max(y1,p.y);}
  const pad=60;
  scale=Math.min((W-pad*2)/((x1-x0)||1),(H-pad*2)/((y1-y0)||1),400);
  offset.x=W/2-(x0+x1)/2*scale;offset.y=H/2+(y0+y1)/2*scale;
  document.getElementById('px-per-m').value=Math.round(scale);
  drawGrid();render();
}

/* ── bluetooth ── */
const DEVICES={
  leica:{
    svc:'3ab10100-f831-4395-b29d-570977d5bf94',
    tx:'3ab10101-f831-4395-b29d-570977d5bf94',
    rx:'3ab10102-f831-4395-b29d-570977d5bf94',
    decode:dv=>{
      if(dv.byteLength>=4){const r=dv.getInt32(0,true);if(r>0&&r<5000000) return parseFloat((r*0.0001).toFixed(4));}
      if(dv.byteLength>=2){const r=dv.getUint16(0,true);if(r>0&&r<50000) return parseFloat((r*0.001).toFixed(3));}
      return null;
    }
  },
  bosch:{
    svc:'0000fff0-0000-1000-8000-00805f9b34fb',
    tx:'0000fff1-0000-1000-8000-00805f9b34fb',
    rx:'0000fff2-0000-1000-8000-00805f9b34fb',
    decode:dv=>{
      /* GLM 100-25C sends 4-byte little-endian mm value */
      if(dv.byteLength>=4){const r=dv.getInt32(0,true);if(r>0&&r<100000) return parseFloat((r*0.001).toFixed(3));}
      /* some firmware sends 2-byte mm */
      if(dv.byteLength>=2){const r=dv.getUint16(0,true);if(r>0&&r<50000) return parseFloat((r*0.001).toFixed(3));}
      return null;
    }
  }
};

let btDevice=null,btChar=null,btOn=false,btDecoder=null;

function onBtMeasurement(e){
  const dv=e.target.value;
  /* always log raw for diagnostics */
  let bytes=[];
  for(let i=0;i<dv.byteLength;i++) bytes.push(dv.getUint8(i).toString(16).padStart(2,'0'));
  console.log('BT raw ['+ bytes.join(' ')+'] len:'+dv.byteLength);
  const val=btDecoder?btDecoder(dv):null;
  if(val!==null&&val>0&&val<200){
    addReading(val,'bluetooth');
  } else {
    /* fallback: show raw so user can report */
    showToast('Raw: ['+bytes.join(' ')+']',5000);
  }
}

async function tryConnectWithProfile(srv, profile){
  try{
    const svc=await srv.getPrimaryService(profile.svc);
    const tx=await svc.getCharacteristic(profile.tx);
    await tx.startNotifications();
    tx.addEventListener('characteristicvaluechanged',onBtMeasurement);
    btDecoder=profile.decode;
    /* try sending trigger command */
    try{const rx=await svc.getCharacteristic(profile.rx);await rx.writeValue(new Uint8Array([0x00,0x01]));}catch(_){}
    return true;
  }catch(_){return false;}
}

async function toggleBluetooth(){
  if(btOn){
    if(btDevice?.gatt?.connected) btDevice.gatt.disconnect();
    btOn=false;btDevice=null;btChar=null;btDecoder=null;setBtUI('off');return;
  }
  if(!navigator.bluetooth){alert('Web Bluetooth not available.\n\nUse Chrome on Android.\nSafari/iOS does not support Web Bluetooth.\n\nEnter readings manually instead.');return;}
  try{
    setBtUI('scan');
    btDevice=await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:[
        DEVICES.leica.svc,
        DEVICES.bosch.svc,
        '0000ffe0-0000-1000-8000-00805f9b34fb'
      ]
    });
    btDevice.addEventListener('gattserverdisconnected',()=>{btOn=false;btChar=null;btDecoder=null;setBtUI('off');showToast('Device disconnected',3000);});
    const srv=await btDevice.gatt.connect();
    const name=(btDevice.name||'').toLowerCase();

    /* try Bosch first if name suggests it, otherwise try Leica first */
    let connected=false;
    if(name.includes('glm')||name.includes('bosch')){
      connected=await tryConnectWithProfile(srv,DEVICES.bosch);
      if(!connected) connected=await tryConnectWithProfile(srv,DEVICES.leica);
    } else {
      connected=await tryConnectWithProfile(srv,DEVICES.leica);
      if(!connected) connected=await tryConnectWithProfile(srv,DEVICES.bosch);
    }

    if(!connected){
      showToast('Connected but could not find measurement service — try taking a reading',4000);
      /* still mark as connected so user can try */
    }
    btOn=true;setBtUI('on',btDevice.name||'Laser');
    showToast('Connected: '+(btDevice.name||'device'));
  }catch(err){setBtUI('off');if(err.name!=='NotFoundError') showToast('BT: '+err.message,4000);}
}

function setBtUI(state,name=''){
  const dot=document.getElementById('bt-dot'),nm=document.getElementById('bt-name'),btn=document.getElementById('btn-bt');
  dot.className='bt-dot';
  if(state==='scan'){dot.classList.add('scanning');nm.textContent='Scanning…';btn.textContent='⬡ Scanning…';}
  else if(state==='on'){dot.classList.add('connected');nm.textContent=name;btn.textContent='⬡ Disconnect';btn.classList.add('on');}
  else{nm.textContent='No device connected';btn.textContent='⬡ Connect laser';btn.classList.remove('on');}
}

/* ── export ── */
function buildExportCanvas(){
  if(!walls.length){alert('Nothing to export — draw some walls first.');return null;}
  const PAD=80,LABEL_H=60,EXP_SCALE=120;
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  for(const w of walls) for(const p of[w.a,w.b]){x0=Math.min(x0,p.x);x1=Math.max(x1,p.x);y0=Math.min(y0,p.y);y1=Math.max(y1,p.y);}
  const cw=Math.ceil((x1-x0)*EXP_SCALE)+PAD*2,ch=Math.ceil((y1-y0)*EXP_SCALE)+PAD*2+LABEL_H;
  const ec=document.createElement('canvas');ec.width=cw;ec.height=ch;
  const c=ec.getContext('2d');
  c.fillStyle='#ffffff';c.fillRect(0,0,cw,ch);
  if(document.getElementById('export-grid').checked){
    c.strokeStyle='rgba(100,130,180,0.12)';c.lineWidth=0.5;
    for(let x=0;x<cw;x+=EXP_SCALE){c.beginPath();c.moveTo(x,0);c.lineTo(x,ch);c.stroke();}
    for(let y=0;y<ch;y+=EXP_SCALE){c.beginPath();c.moveTo(0,y);c.lineTo(cw,y);c.stroke();}
    c.strokeStyle='rgba(100,130,180,0.3)';c.lineWidth=1;
    for(let x=0;x<cw;x+=EXP_SCALE*5){c.beginPath();c.moveTo(x,0);c.lineTo(x,ch);c.stroke();}
    for(let y=0;y<ch;y+=EXP_SCALE*5){c.beginPath();c.moveTo(0,y);c.lineTo(cw,y);c.stroke();}
  }
  const toE=(wx,wy)=>({x:(wx-x0)*EXP_SCALE+PAD,y:(y1-wy)*EXP_SCALE+PAD});
  for(const w of walls){
    const a=toE(w.a.x,w.a.y),b=toE(w.b.x,w.b.y);
    c.strokeStyle='#1a3a5c';c.lineWidth=2.5;c.beginPath();c.moveTo(a.x,a.y);c.lineTo(b.x,b.y);c.stroke();
    const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1,nx=-dy/len,ny=dx/len,OFF=22;
    const lx1=a.x+nx*OFF,ly1=a.y+ny*OFF,lx2=b.x+nx*OFF,ly2=b.y+ny*OFF;
    c.strokeStyle='#4a7aac';c.lineWidth=1;c.beginPath();c.moveTo(lx1,ly1);c.lineTo(lx2,ly2);c.stroke();
    const tx=-nx*5,ty=-ny*5;
    c.beginPath();c.moveTo(lx1+tx,ly1+ty);c.lineTo(lx1-tx,ly1-ty);c.stroke();
    c.beginPath();c.moveTo(lx2+tx,ly2+ty);c.lineTo(lx2-tx,ly2-ty);c.stroke();
    const val=w.measurement!==null?w.measurement:Math.hypot(w.b.x-w.a.x,w.b.y-w.a.y);
    const label=val.toFixed(3)+' m'+(w.measurement===null?' (drawn)':'');
    const mx=(lx1+lx2)/2,my=(ly1+ly2)/2;
    c.save();c.font='bold 12px Arial,sans-serif';c.textAlign='center';c.textBaseline='middle';
    const tw=c.measureText(label).width;
    c.fillStyle='rgba(255,255,255,0.92)';c.fillRect(mx-tw/2-4,my-9,tw+8,18);
    c.fillStyle='#1a3a5c';c.fillText(label,mx,my);c.restore();
  }
  const seen=new Set();
  for(const w of walls) for(const p of[w.a,w.b]){
    const k=p.x.toFixed(4)+','+p.y.toFixed(4);if(seen.has(k)) continue;seen.add(k);
    const s=toE(p.x,p.y);c.beginPath();c.arc(s.x,s.y,4,0,Math.PI*2);c.fillStyle='#1a3a5c';c.fill();c.strokeStyle='#fff';c.lineWidth=1.5;c.stroke();
  }
  let perim=0;
  for(const w of walls){perim+=getWallExternalLen(w);}
  const gfaPts=getGFAPolygon();
  const gfa=computeGFA(gfaPts);
  const fy=ch-LABEL_H+4;
  c.fillStyle='#e8eff6';c.fillRect(0,fy,cw,LABEL_H);
  c.strokeStyle='#c8dded';c.lineWidth=1;c.beginPath();c.moveTo(0,fy);c.lineTo(cw,fy);c.stroke();
  c.fillStyle='#1a3a5c';c.font='bold 13px Arial,sans-serif';c.textAlign='left';c.textBaseline='top';
  const fname=document.getElementById('export-filename').value||'Field Sketch';
  c.fillText(fname,14,fy+8);
  c.font='12px Arial,sans-serif';c.fillStyle='#3a5a7c';
  const dateStr=new Date().toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'});
  const measNote=measSource==='internal'?` (wall ${wallThickness.toFixed(3)}m)`:'';
  c.fillText(`Walls: ${walls.length}   Perimeter: ${perim.toFixed(3)} m   GFA: ${gfa.toFixed(2)} m²   From: ${measSource}${measNote}   ${dateStr}`,14,fy+26);
  c.font='10px Arial,sans-serif';c.fillStyle='#7a9abc';c.fillText('Field Sketch — '+window.location.hostname,14,fy+44);
  return ec;
}
function exportJpeg(){
  const ec=buildExportCanvas();if(!ec) return;
  const fname=(document.getElementById('export-filename').value||'field-sketch').replace(/[^a-z0-9_-]/gi,'_');
  ec.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fname+'.jpg';a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);showToast('JPEG downloaded');},'image/jpeg',0.95);
}

/* ── google drive ── */
const GOOGLE_CLIENT_ID='YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
let driveToken=null;
function loadGIS(){return new Promise((resolve,reject)=>{if(window.google?.accounts?.oauth2){resolve();return;}const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';s.onload=resolve;s.onerror=()=>reject(new Error('Could not load Google Identity Services'));document.head.appendChild(s);});}
async function getDriveToken(){
  await loadGIS();
  return new Promise((resolve,reject)=>{
    const client=google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:'https://www.googleapis.com/auth/drive.file',callback:(resp)=>{if(resp.error){reject(new Error(resp.error));return;}driveToken=resp.access_token;resolve(driveToken);}});
    client.requestAccessToken({prompt:driveToken?'':'consent'});
  });
}
async function exportToDrive(){
  if(GOOGLE_CLIENT_ID==='YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com'){setDriveStatus('⚠ Replace GOOGLE_CLIENT_ID in the source with your own OAuth client ID.','#b06000');return;}
  const ec=buildExportCanvas();if(!ec) return;
  setDriveStatus('Signing in to Google…','#1a3a5c');
  try{
    const token=await getDriveToken();setDriveStatus('Uploading…','#1a3a5c');
    ec.toBlob(async blob=>{
      try{
        const fname=(document.getElementById('export-filename').value||'field-sketch').replace(/[^a-z0-9_\- ]/gi,'_')+'.jpg';
        const boundary='fieldsketch_'+Date.now();
        const meta=JSON.stringify({name:fname,mimeType:'image/jpeg'});
        const metaBytes=new TextEncoder().encode('--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+meta+'\r\n'+'--'+boundary+'\r\nContent-Type: image/jpeg\r\n\r\n');
        const closeBytes=new TextEncoder().encode('\r\n--'+boundary+'--');
        const imgBytes=new Uint8Array(await blob.arrayBuffer());
        const body=new Uint8Array(metaBytes.length+imgBytes.length+closeBytes.length);
        body.set(metaBytes,0);body.set(imgBytes,metaBytes.length);body.set(closeBytes,metaBytes.length+imgBytes.length);
        const resp=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},body});
        if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||resp.statusText);}
        setDriveStatus('✓ Saved to Drive: '+fname,'#1a6b3a');showToast('Saved to Google Drive');
      }catch(err){setDriveStatus('Upload failed: '+err.message,'#8b1a1a');}
    },'image/jpeg',0.95);
  }catch(err){setDriveStatus('Sign-in failed: '+err.message,'#8b1a1a');}
}
function setDriveStatus(msg,color='#5a5c63'){const el=document.getElementById('drive-status');el.textContent=msg;el.style.color=color;}

updateSettings();
renderReadings();
